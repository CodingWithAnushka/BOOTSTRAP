<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">

<h2 class="text-center">Registration Form</h2>

<form>

<label>Name</label>
<input type="text" class="form-control mb-3" placeholder="Enter Name">

<label>Email</label>
<input type="email" class="form-control mb-3" placeholder="Enter Email">

<label>Password</label>
<input type="password" class="form-control mb-3" placeholder="Enter Password">

<label>Mobile Number</label>
<input type="number" class="form-control mb-3" placeholder="Enter Mobile">

<label>Gender</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<br><br>

<label>Address</label>
<textarea class="form-control mb-3" placeholder="Enter Address"></textarea>

<button class="btn btn-success w-100">
Register
</button>

</form>

</div>

</div>

</body>
</html>
