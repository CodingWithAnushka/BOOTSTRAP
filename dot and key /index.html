<!DOCTYPE html>
<html>
<head>
<title>Dot & Key Serum</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRT3LErxm8F0Gbhw48jH7a4aVjvrDWC-RLRphy9-ujkVA&s=10");
    background-size:cover;
    background-position:center;
    animation: zoom 8s infinite alternate;
}

.content{
    animation: fade 2s ease-in;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:55px;
    font-weight:bold;
}

.btn{
    background:#ff5c8a;
    color:white;
    border:none;
}

</style>

</head>

<body>

<section class="hero d-flex align-items-center text-white">

<div class="container text-center content">

<h1>Dot & Key Serum ✨</h1>

<p class="fs-4">
Healthy Glow • Deep Hydration • Bright Skin
</p>

<button class="btn btn-lg px-5">
Shop Now
</button>

</div>

</section>

</body>
</html>
