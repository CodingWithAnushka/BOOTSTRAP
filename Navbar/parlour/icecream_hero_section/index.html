<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Hero</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero{
    background: url("https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=1400&q=80") center center/cover no-repeat;
    height: 100vh;
}

.overlay{
    background: rgba(0,0,0,0.45);
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}
</style>
</head>

<body>

<section class="hero">
    <div class="overlay">
        <div class="container">
            <h1 class="display-2 fw-bold">Delicious Ice Cream</h1>

            <p class="lead">
                Enjoy Fresh, Creamy & Tasty Ice Cream in Every Flavor
            </p>

            <a href="#" class="btn btn-warning btn-lg mt-3">
                Order Now
            </a>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
