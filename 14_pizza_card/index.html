<!DOCTYPE html>
<html>
<head>
    <title>Pizza Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSa1mn92chRjtcPFVqpgQZCzhJ22OniH82M3jMoywN_Dg&s=10"
</head>

<body class="bg-light">


<div class="container mt-5">

    <div class="card shadow" style="width: 5rem;">

        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591"
     class="card-img-top"
     alt="Pizza"
     style="height: 200px; object-fit: cover;">

        <div class="card-body">

            <h3 class="card-title">Cheese Pizza 🍕</h3>

            <p class="card-text">
                Delicious cheese pizza made with fresh ingredients.
                It contains crispy crust, extra cheese and tasty toppings.
            </p>

            <h5 class="text-danger">Price: ₹299</h5>

            <a href="#" class="btn btn-danger">
                Order Now
            </a>

        </div>

    </div>

</div>


</body>
</html>
